type User {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    phoneNumber: String
    isAdmin: Boolean!
    notifyMarketing: Boolean!
    deletionRequestedAt: DateTime
    address: Address
    orders: [Order!]
}

input UpdateUserInput {
    firstName: String
    lastName: String
    email: String
    phoneNumber: String
    addressId: String
    notifyMarketing: Boolean
}

type CustomerStats {
    userId: ID!
    firstName: String!
    lastName: String!
    email: String!
    phoneNumber: String
    registeredAt: DateTime!
    totalOrders: Int!
    totalAmount: String!
    averageOrderAmount: String!
    firstOrderDate: DateTime!
    lastOrderDate: DateTime!
    preferredOrderType: OrderTypeEnum!
    deliveryCount: Int!
    pickupCount: Int!
}

type CustomerStatsSummary {
    totalCustomers: Int!
    totalRevenue: String!
    averageOrderValue: String!
    totalOrders: Int!
}

type CustomerStatsResponse {
    summary: CustomerStatsSummary!
    customers: [CustomerStats!]!
}

extend type Query {
    me: User! @auth
    customerStats: CustomerStatsResponse! @admin
}

extend type Mutation {
    updateMe (
        input: UpdateUserInput!
    ): User! @auth
    requestDeletion: User! @auth
    cancelDeletionRequest: User! @auth
}
