type Address {
    id: String!                    # Google place_id for new addresses, legacy UUID for old orders
    postcode: String!
    municipalityName: String!
    streetName: String!
    houseNumber: String!
    boxNumber: String
    distance: Float!               # meters (driving distance from Routes API)
    lat: Float
    lng: Float
    duration: Int                  # seconds (driving duration from Routes API), nullable for legacy
}

type AddressSuggestion {
    placeId: String!
    description: String!
    mainText: String!
    secondaryText: String!
}

extend type Query {
    autocompleteAddresses(input: String!, sessionToken: String!): [AddressSuggestion!]!
    resolveAddress(placeId: String!, sessionToken: String!): Address!
}
