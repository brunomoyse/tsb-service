type DaySchedule {
    open: String!
    close: String!
    dinnerOpen: String
    dinnerClose: String
}

type RestaurantConfig {
    orderingEnabled: Boolean!
    # Populated when ordering was disabled automatically by the
    # system (e.g. HubRise circuit breaker). NULL means either
    # ordering is enabled or the admin manually disabled it.
    systemDisableReason: String
    openingHours: JSON!
    orderingHours: JSON
    isCurrentlyOpen: Boolean!
    isOrderingCurrentlyOpen: Boolean!
    updatedAt: DateTime!
}

input DayScheduleInput {
    open: String!
    close: String!
    dinnerOpen: String
    dinnerClose: String
}

input OpeningHoursInput {
    monday: DayScheduleInput
    tuesday: DayScheduleInput
    wednesday: DayScheduleInput
    thursday: DayScheduleInput
    friday: DayScheduleInput
    saturday: DayScheduleInput
    sunday: DayScheduleInput
}

extend type Query {
    restaurantConfig: RestaurantConfig!
}

extend type Mutation {
    updateOrderingEnabled(enabled: Boolean!): RestaurantConfig! @admin
    updateOpeningHours(hours: OpeningHoursInput!): RestaurantConfig! @admin
    updateOrderingHours(hours: OpeningHoursInput!): RestaurantConfig! @admin
}

extend type Subscription {
    restaurantConfigUpdated: RestaurantConfig!
}
