name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rollback to (e.g. v1.0.0)'
        required: true
        type: string
      migrations_down:
        description: 'Number of migrations to rollback (0 = none)'
        required: true
        default: '0'
        type: string

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/tsb-service

# ── Test (auto on push to main) ──────────────────────────────────────────────

jobs:
  build_test:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    name: Build Test Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and Push Multi-Arch Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --push \
            .

  deploy_test:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: build_test
    name: Deploy to Home Server
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy webhook
        run: |
          curl -X POST ${{ vars.DEPLOY_WEBHOOK_URL }} \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --fail --max-time 300

# ── Production release (tag push v*) ────────────────────────────────────────

  build_production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    name: Build Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.PAT }}" | docker login ${{ env.DOCKER_REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Build and Push Production Image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:production \
            --tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --push \
            .

  deploy_production:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: build_production
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy and migrate via SSH (Helm)
        uses: appleboy/ssh-action@v1
        env:
          APP: tsb-service
          TAG: ${{ github.ref_name }}
        with:
          host: ${{ vars.OVH_HOST }}
          username: ${{ vars.OVH_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          envs: APP,TAG
          script: |
            set -euo pipefail
            export SOPS_AGE_KEY_FILE=/opt/tokyosushi/.config/sops/age/keys.txt
            cd /opt/tokyosushi/tsb-infra
            git pull --ff-only
            sops -d "secrets/${APP}.secret.enc.yaml" | sudo kubectl apply -n tokyosushi -f -
            sudo flock -w 600 /var/lock/tokyosushi-apps-helm.lock env KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install tokyosushi-apps ./charts/tokyosushi-apps \
              --namespace tokyosushi \
              --reuse-values \
              --set "apps.${APP}.image.tag=${TAG}" \
              --atomic --timeout 5m
            sudo kubectl exec -n tokyosushi deployment/tsb-service -- /app/tsb-migrate -cmd=up

# ── Rollback (manual trigger) ────────────────────────────────────────────────

  rollback:
    if: github.event_name == 'workflow_dispatch'
    name: Rollback Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Rollback via SSH (Helm)
        uses: appleboy/ssh-action@v1
        env:
          APP: tsb-service
          TAG: ${{ inputs.version }}
          MIGRATIONS_DOWN: ${{ inputs.migrations_down }}
        with:
          host: ${{ vars.OVH_HOST }}
          username: ${{ vars.OVH_USER }}
          key: ${{ secrets.OVH_SSH_PRIVATE_KEY }}
          envs: APP,TAG,MIGRATIONS_DOWN
          script: |
            set -euo pipefail
            cd /opt/tokyosushi/tsb-infra
            # Roll back DB migrations first (using current container), before swapping image
            for i in $(seq 1 "${MIGRATIONS_DOWN:-0}"); do
              sudo kubectl exec -n tokyosushi deployment/tsb-service -- /app/tsb-migrate -cmd=down
            done
            sudo flock -w 600 /var/lock/tokyosushi-apps-helm.lock env KUBECONFIG=/etc/rancher/k3s/k3s.yaml helm upgrade --install tokyosushi-apps ./charts/tokyosushi-apps \
              --namespace tokyosushi \
              --reuse-values \
              --set "apps.${APP}.image.tag=${TAG}" \
              --atomic --timeout 5m
